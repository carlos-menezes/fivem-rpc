name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format
      - run: pnpm lint
      - run: pnpm test

      - name: Lint commit messages
        run: pnpm dlx commitlint --from ${{ github.event.pull_request.base.sha || github.event.before }} --to HEAD
